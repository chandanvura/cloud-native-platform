apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require CPU and memory limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      All pods in the apps namespace must declare CPU and memory limits.
      Without limits, a single misbehaving pod can starve all other pods
      on the node. Required for HPA to function correctly.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-limits
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [apps]
      validate:
        message: >
          CPU and memory limits are required on all containers.
          Add: resources.limits.memory and resources.limits.cpu
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    memory: "?*"
                    cpu: "?*"
