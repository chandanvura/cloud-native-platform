apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow latest image tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >
      Using :latest tag makes deployments non-reproducible. If the
      registry pushes a broken image with :latest, your rollback
      (which re-deploys the same :latest tag) deploys the same
      broken image. Always use immutable SHA or version tags.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: disallow-latest
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [apps]
      validate:
        message: >
          Image tag ':latest' is not allowed in production.
          Use an immutable tag like a git SHA (e.g. :abc1234).
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ element.image }}"
                    operator: NotContains
                    value: ":"
