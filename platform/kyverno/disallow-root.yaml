apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-root-containers
  annotations:
    policies.kyverno.io/title: Disallow root containers
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Containers must not run as root. Running as root gives the process
      uid 0 inside the container. In a container escape, that becomes
      root on the host node — a critical security risk.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-run-as-non-root
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [apps]
      validate:
        message: >
          Containers must not run as root.
          Set securityContext.runAsNonRoot: true
        pattern:
          spec:
            containers:
              - securityContext:
                  runAsNonRoot: true
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privilege-escalation
  annotations:
    policies.kyverno.io/title: Disallow privilege escalation
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: deny-privilege-escalation
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [apps]
      validate:
        message: >
          allowPrivilegeEscalation must be set to false.
          Add: securityContext.allowPrivilegeEscalation: false
        pattern:
          spec:
            containers:
              - securityContext:
                  allowPrivilegeEscalation: false
